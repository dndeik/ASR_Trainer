[network_config]


[GPUs]
devices = "0"   # number of available gpus

[optimizer]
lr = 3.5e-5

[model]
encoder_d_model = 640
predictor_d_model = 512
joiner_d_model = 640
encoder_layer_num = 18
predictor_layer_num = 2
n_heads = 20
n_groups = 10
chunk_size = 72
left_context_chunk_number = 4
right_context_chunk_number = 0
mamba_every_n_block = -1  # if you don't want to use mamba, set -1
time_factor = 4
n_mel = 80

[tokenizer]
tokenizer_path = "tokenizers/ru_en_tokenizer/tokenizer_spe_bpe_2048"

[listener]
listener_sr = 16000

[FFT]
n_fft = 480
hop_length = 240
win_length = 480

[train_dataset]
train_manifest = "/opt/datasets/ASR_data/CAPITALIZED_TRAIN_FINAL.jsonl" # Put the path to your train dataset
file_num = -1
max_len = 13
min_len = 3

[train_dataloader]
batch_size = 10
num_workers = 6
drop_last = true
pin_memory = true

[validation_dataset]
train_manifest = "/opt/datasets/ASR_data/CAPITALIZED_TEST_FINAL.jsonl" # Put the path to your test dataset
file_num = -1
max_len = 18
min_len = 4

[validation_dataloader]
batch_size = 36
num_workers = 12
pin_memory = true

[augmentations]
augs_enable = true
min_augs = 1
max_augs = 3
noise_folder = "<folder path>"
rir_folder = "<folder_path>"

[logger]
log_to_clearml = true

[init_weights]
checkpoint_path = "experiments/RU_18_layer_model_GQA_Squeezeformer_|_New_tokenizer_(800_tokens)_|_2_layer_512_pred_2026-02-13-13h16m/checkpoints/model_0001.tar"
#checkpoint_path = ""
strict = true

[trainer]
epochs = 30
warm_up_steps = 2500
epoch_when_enable_aug = 0
save_checkpoint_interval = 1
train_with_amp = true
grad_accum = 3
validation_interval_steps = 20000
clip_grad_norm_value = 50.0

[experiment]
experiments_path = "experiments"
exp_name = "RU-EN 18 layer model GQA Squeezeformer | Multi Lang | 2048 tokenizer"
resume = false
resume_from_folder = "experiments/RU-EN_18_layer_model_GQA_Squeezeformer_|_Multi_Lang_|_2048_tokenizer_2026-03-20-02h31m"